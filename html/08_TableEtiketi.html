<html>
    <head>
        <title>Uygulama 8</title>
    </head>

    <body>
        <table width="200" border="1">
            <tr>
                <td height="25" align="center" bgcolor="yellow">1</td>
                <td align="center" bgcolor="blue">2</td>
                <td align="center" bgcolor="yellow">3</td>
            </tr>

            <tr>
                <td height="25" align="center" bgcolor="blue">4</td>
                <td align="center" bgcolor="yellow">5</td>
                <td align="center" bgcolor="blue">6</td>
            </tr>

            <tr>
                <td height="25" align="center" bgcolor="yellow">7</td>
                <td align="center" bgcolor="blue">8</td>
                <td align="center" bgcolor="yellow">9</td>
            </tr>

        </table>    
        <br><br>
        

        <table border="1" width="200">

            <tr>
                <td height="25" colspan="3" bgcolor="yellow" align="center">1</td>
            </tr>

            <tr>
                <td height="25" bgcolor="blue" align="center">2</td>
                <td bgcolor="yellow" align="center">3</td>
                <td bgcolor="blue" align="center">4</td>
            </tr>

            <tr>
                <td height="25" bgcolor="yellow" align="center">5</td>
                <td bgcolor="blue" align="center">6</td>
                <td bgcolor="yellow" align="center">7</td>
            </tr>

        </table>

        <br><br>

        <table width="200" border="1" bgcolor="yellow">
            <tr>
                <td rowspan="3"></td>
                <td height="25"></td>
                <td></td>
            </tr>

            <tr bgcolor="blue">
                <td height="25"></td>
                <td></td>
            </tr>

            <tr>
                <td height="25"></td>
                <td></td>
            </tr>

        </table>    

    </body>

</html>
